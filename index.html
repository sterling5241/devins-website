<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a1612">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>The.Pouches</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- HEADER -->
  <header>
    <a class="logo" href="#" id="logo-link"><img id="site-logo-img" style="display:none;height:36px;object-fit:contain;vertical-align:middle;" alt="logo"><span id="site-logo-text">The<span>.</span>Pouches</span></a>
    <nav>
      <a href="#shop" class="cart-btn hide-mobile" style="background:var(--slate)">Shop</a>
      <a onclick="openCartModal()" class="cart-btn" id="cart-btn">Cart (0)</a>
    </nav>
  </header>

  <!-- HERO BANNER -->
  <section class="hero" style="background-color: rgb(40, 113, 195);">
    <div class="hero-bg active" id="hero-bg">
      <img id="hero-bg-img" alt="">
    </div>
    <div class="hero-schedule" id="hero-schedule"></div>
  </section>

  <!-- SLIDER -->
  <section class="slider" id="slider">
    <div class="slider-track" id="slider-track"></div>
    <button class="slider-arrow prev" id="slider-prev" aria-label="Previous slide">‹</button>
    <button class="slider-arrow next" id="slider-next" aria-label="Next slide">›</button>
    <div class="slider-dots" id="slider-dots"></div>
  </section>

  <!-- PRODUCT GRID -->
  <section class="shop-section" id="shop">
    <div class="section-header">
      <h2 class="section-title">Available Now</h2>
      <span class="item-count" id="item-count"></span>
    </div>
    <div class="grid" id="product-grid"></div>
  </section>

  <!-- MOBILE STICKY CART BAR -->
  <div class="mobile-cart-bar" id="mobile-cart-bar" onclick="openCartModal()">
    <div class="mobile-cart-left">
      <span class="mobile-cart-icon">🛒</span>
      <span class="mobile-cart-count" id="mobile-cart-count">Cart is empty</span>
    </div>
    <span class="mobile-cart-total" id="mobile-cart-total">$0.00</span>
  </div>

  <footer>© 2026 The.Pouches &nbsp;·&nbsp; <span id="site-footer-text">All items sold as-is · Questions? Just reach out.</span></footer>

  <!-- CART MODAL -->
  <div class="modal-overlay" id="cart-modal">
    <div class="modal cart-modal">
      <div class="modal-header">
        <h2>Your Cart</h2>
        <button class="modal-close" onclick="closeModal('cart-modal')">×</button>
      </div>
      <div class="modal-body" id="cart-modal-body"></div>
    </div>
  </div>

  <!-- ORDER CONFIRMATION OVERLAY -->
  <div class="confirm-overlay" id="confirm-overlay">
    <div class="confirm-wrap">
      <div class="confirm-panel" id="confirm-left">
        <div class="confirm-panel-header">
          <h2>Order Confirmed</h2>
          <button class="confirm-panel-close" onclick="closeConfirm()">✕</button>
        </div>
        <div class="confirm-panel-body" id="confirm-left-body"></div>
      </div>
      <div class="confirm-panel" id="confirm-right">
        <div class="confirm-panel-header">
          <h2 id="confirm-right-title">Pickup Instructions</h2>
        </div>
        <div class="confirm-panel-body" id="confirm-right-body"></div>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast-container" id="toast-container"></div>

  <script src="js/shared.js"></script>
  <script src="js/shop.js"></script>

</body>
</html>
